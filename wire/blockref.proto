syntax = "proto3";

package wire;

option go_package = "../wire";

enum RefType {
    Blob = 0;
    RefList = 1;
    File = 2;
}

enum CipherType {
    None = 0;
    AES_CBC = 1;
    AES_CBC_ZSTD = 2;
}

message BlockRef {
    RefType type = 1;
    bytes oid = 2;
    CipherType cipher = 3;
    bytes key = 4;
    int32 offset = 5;
    int32 limit = 6; // zero means use all
}

message BlockRefList {
    string magic = 1;
    repeated BlockRef refs = 2;
}
