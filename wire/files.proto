syntax = "proto3";

package wire;

option go_package = "../wire";

import public "blockref.proto";

message FileHead {
    string magic = 1;
    BlockRef grabs = 4;         // for encrypted files: publicly visible references, used for GC
    bytes private = 5;
}

// this part usually is encrypted
message FileControl {
    BlockRef content = 1;
    map<string, string> headers = 2;
    bool directory = 3;
}
