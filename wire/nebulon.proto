syntax = "proto3";

package wire;

enum RefType {
    Blob = 0;
    RefList = 1;
}

enum CipherType {
    Dummy = 0;
}

message BlockRef {
    RefType type = 1;
    bytes oid = 2;
    CipherType cipher = 3;
    bytes key = 4;
}

message BlockRefList {
    string magic = 1;
    repeated BlockRef refs = 2;
}
