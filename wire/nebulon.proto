syntax = "proto3";

package wire;

enum RefType {
    Blob = 0;
    RefList = 1;
}

enum CipherType {
    Dummy = 0;
}

message BlockRef {
    RefType type = 1;
    bytes data = 2;
}

message BlockRefKey {
    BlockRef block = 1;
    CipherType cipher = 2;
    bytes key = 3;
}

message BlockRefList {
    string magic = 1;
    repeated BlockRef refs = 2;
}
